<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Direct Message - SmartService</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .wa-card {
            background: white;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            padding: 40px;
            box-shadow: var(--shadow-md);
            max-width: 600px;
            margin: 40px auto;
        }

        .phone-input-row {
            display: grid;
            grid-template-columns: 100px 1fr;
            gap: 16px;
        }

        .wa-icon-glow {
            background: #dcfce7;
            color: #22c55e;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 24px auto;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
            animation: pulse-green 2s infinite ease-in-out;
        }

        @keyframes pulse-green {
            0%, 100% {
                box-shadow: 0 0 10px rgba(34, 197, 94, 0.2);
            }
            50% {
                box-shadow: 0 0 25px rgba(34, 197, 94, 0.5);
            }
        }

        .submit-wa {
            background: linear-gradient(135deg, #22c55e 0%, #15803d 100%) !important;
            color: white !important;
            border: none !important;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.2) !important;
        }
        .submit-wa:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.35) !important;
        }
    </style>
</head>
<body style="padding-top: 70px;">
    <site-header></site-header>

    <main class="container section-padding" style="padding-top: 20px;">
        <!-- Header -->
        <div style="margin-bottom: 24px; text-align: center;">
            <a href="index.html" style="color: var(--primary); font-weight: 600;"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
            <h1 style="font-size: 2.2rem; margin-top: 12px; color: var(--text-main);"><i class="fab fa-whatsapp mr-2 text-success" style="color: #22c55e;"></i>WhatsApp Direct Message</h1>
            <p style="color: var(--text-muted); max-width: 600px; margin: 8px auto 0 auto;">Send official receipts, billing details, or custom text messages directly without saving contact numbers.</p>
        </div>

        <div class="wa-card fade-in">
            <div class="wa-icon-glow">
                <i class="fab fa-whatsapp"></i>
            </div>
            
            <form id="waForm">
                <div class="form-group">
                    <label class="form-label" for="waPhone">Mobile Number</label>
                    <div class="phone-input-row">
                        <select id="waCode" class="form-control" style="font-weight: 600; text-align: center;">
                            <option value="91">+91 (IN)</option>
                            <option value="1">+1 (US)</option>
                            <option value="44">+44 (UK)</option>
                            <option value="971">+971 (AE)</option>
                            <option value="880">+880 (BD)</option>
                            <option value="977">+977 (NP)</option>
                        </select>
                        <input type="tel" id="waPhone" class="form-control" placeholder="Enter 10-digit mobile number" maxlength="10" pattern="[0-9]{10}" required style="font-weight: 600; font-size: 1.05rem; letter-spacing: 0.5px;">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="waMsg">Message Body (Optional)</label>
                    <textarea id="waMsg" class="form-control" rows="4" placeholder="Type message details, links, or receipts here..."></textarea>
                </div>

                <button type="submit" class="btn submit-wa" style="width: 100%; font-size: 1.05rem; margin-top: 16px;">
                    <i class="fab fa-whatsapp" style="font-size: 1.2rem;"></i> Start Chat & Send Message
                </button>
            </form>
        </div>
    </main>

    <site-footer></site-footer>

    <script src="assets/js/components.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById("waForm");
            const codeSelect = document.getElementById("waCode");
            const phoneInput = document.getElementById("waPhone");
            const msgInput = document.getElementById("waMsg");

            form.addEventListener("submit", (e) => {
                e.preventDefault();

                const code = codeSelect.value;
                const phone = phoneInput.value.trim();
                const msg = encodeURIComponent(msgInput.value.trim());

                if (!/^[0-9]{10}$/.test(phone)) {
                    showToast("Please enter a valid 10-digit mobile number.", "error");
                    return;
                }

                // Construct direct link
                let url = `https://api.whatsapp.com/send?phone=${code}${phone}`;
                if (msg) {
                    url += `&text=${msg}`;
                }

                // Open link
                window.open(url, "_blank");
                showToast("Opening WhatsApp chat drawer.", "success");
            });

            // Restrict characters
            phoneInput.addEventListener("input", (e) => {
                e.target.value = e.target.value.replace(/[^0-9]/g, "");
            });
        });
    </script>
</body>
</html>

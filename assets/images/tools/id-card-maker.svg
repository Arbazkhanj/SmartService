<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#eff6ff" />
            <stop offset="100%" stop-color="#dbeafe" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-blue" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#3b82f6" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-blue)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <!-- ID Card Lanyard top -->
    <rect x="130" y="8" width="20" height="12" rx="3" fill="#475569" />
    <!-- ID Badge card itself -->
    <rect x="95" y="20" width="90" height="105" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <rect x="95" y="20" width="90" height="15" rx="8" fill="#3b82f6" />
    <!-- Photo placeholder -->
    <rect x="125" y="44" width="30" height="36" rx="2" fill="#eff6ff" stroke="#93c5fd" />
    <circle cx="140" cy="54" r="5" fill="#3b82f6" />
    <path d="M129,76 C129,68 151,68 151,76 Z" fill="#3b82f6" />
    <!-- Details text lines -->
    <rect x="110" y="88" width="60" height="3" fill="#cbd5e1" />
    <rect x="110" y="95" width="60" height="3" fill="#cbd5e1" />
    <!-- Barcode lines at bottom -->
    <g transform="translate(112, 105)">
        <rect x="0" y="0" width="2" height="10" fill="#1e293b" />
        <rect x="4" y="0" width="4" height="10" fill="#1e293b" />
        <rect x="10" y="0" width="2" height="10" fill="#1e293b" />
        <rect x="14" y="0" width="6" height="10" fill="#1e293b" />
        <rect x="22" y="0" width="2" height="10" fill="#1e293b" />
        <rect x="26" y="0" width="4" height="10" fill="#1e293b" />
        <rect x="32" y="0" width="6" height="10" fill="#1e293b" />
        <rect x="40" y="0" width="2" height="10" fill="#1e293b" />
        <rect x="44" y="0" width="4" height="10" fill="#1e293b" />
        <rect x="50" y="0" width="6" height="10" fill="#1e293b" />
    </g>

    </g>
</svg>
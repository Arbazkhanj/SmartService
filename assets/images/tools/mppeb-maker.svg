<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#eff6ff" />
            <stop offset="100%" stop-color="#dbeafe" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-blue" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#3b82f6" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-blue)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <rect x="95" y="15" width="90" height="110" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <rect x="101" y="20" width="78" height="100" rx="2" fill="none" stroke="#cbd5e1" stroke-dasharray="2 2" />
    <!-- Photo slot -->
    <rect x="112" y="28" width="56" height="42" rx="2" fill="#eff6ff" stroke="#93c5fd" />
    <circle cx="140" cy="44" r="7" fill="#3b82f6" opacity="0.7" />
    <path d="M125,64 C125,55 155,55 155,64 Z" fill="#3b82f6" opacity="0.7" />
    <!-- Sign Slot -->
    <rect x="112" y="76" width="56" height="16" rx="2" fill="#f8fafc" stroke="#93c5fd" />
    <path d="M118,87 Q128,78 138,85 T158,82" fill="none" stroke="#1e293b" stroke-width="1" />
    <!-- Handwritten block -->
    <rect x="108" y="98" width="64" height="16" rx="1.5" fill="#f8fafc" stroke="#e2e8f0" />
    <line x1="112" y1="103" x2="168" y2="103" stroke="#cbd5e1" stroke-width="1" />
    <line x1="112" y1="109" x2="160" y2="109" stroke="#cbd5e1" stroke-width="1" />

    </g>
</svg>
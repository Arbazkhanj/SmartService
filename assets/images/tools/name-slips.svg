<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fdf2f8" />
            <stop offset="100%" stop-color="#fce7f3" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-pink" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#db2777" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-pink)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#db2777" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#db2777" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <!-- Sticker background with colorful clouds -->
    <rect x="80" y="25" width="120" height="90" rx="10" fill="#ffffff" stroke="#db2777" stroke-width="3" />
    <rect x="85" y="30" width="110" height="80" rx="6" fill="#fff5f5" />
    <!-- Cloud pattern -->
    <circle cx="100" cy="50" r="16" fill="#fbcfe8" opacity="0.4" />
    <circle cx="120" cy="45" r="20" fill="#fbcfe8" opacity="0.4" />
    <circle cx="140" cy="52" r="16" fill="#fbcfe8" opacity="0.4" />
    
    <!-- Sticker lines "Name, Class, Subject" -->
    <text x="95" y="55" font-family="sans-serif" font-weight="bold" font-size="8" fill="#db2777">NAME:</text>
    <line x1="130" y1="55" x2="180" y2="55" stroke="#db2777" stroke-width="1" stroke-dasharray="2 1" />
    
    <text x="95" y="72" font-family="sans-serif" font-weight="bold" font-size="8" fill="#db2777">CLASS:</text>
    <line x1="132" y1="72" x2="180" y2="72" stroke="#db2777" stroke-width="1" stroke-dasharray="2 1" />

    <text x="95" y="89" font-family="sans-serif" font-weight="bold" font-size="8" fill="#db2777">SUBJECT:</text>
    <line x1="145" y1="89" x2="180" y2="89" stroke="#db2777" stroke-width="1" stroke-dasharray="2 1" />

    </g>
</svg>
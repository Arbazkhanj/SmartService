<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fffbeb" />
            <stop offset="100%" stop-color="#fef3c7" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-amber" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#f59e0b" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-amber)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <!-- Graduation Cap mortarboard -->
    <g transform="translate(105, 15)">
        <polygon points="35,0 70,12 35,24 0,12" fill="#d97706" />
        <rect x="20" y="17" width="30" height="10" fill="#b45309" />
        <!-- Tassel -->
        <path d="M 58 15 L 68 28 L 65 34" fill="none" stroke="#f59e0b" stroke-width="2" />
    </g>
    <!-- Grade chart panel -->
    <rect x="90" y="55" width="100" height="60" rx="6" fill="#ffffff" stroke="#d97706" stroke-width="2" />
    <text x="140" y="76" font-family="sans-serif" font-weight="bold" font-size="14" fill="#d97706" text-anchor="middle">9.5 CGPA</text>
    <path d="M120,86 L160,86" stroke="#cbd5e1" stroke-width="2" />
    <text x="140" y="105" font-family="sans-serif" font-weight="bold" font-size="12" fill="#10b981" text-anchor="middle">90.25%</text>

    </g>
</svg>
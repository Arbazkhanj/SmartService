<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#eff6ff" />
            <stop offset="100%" stop-color="#dbeafe" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-blue" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#3b82f6" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-blue)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <!-- JPG image on the left -->
    <g transform="translate(60, 35)">
        <rect x="0" y="0" width="60" height="55" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
        <rect x="4" y="4" width="52" height="36" rx="2" fill="#eff6ff" />
        <path d="M 4 40 L 20 25 L 35 36 L 50 20 L 56 40 Z" fill="#93c5fd" />
        <circle cx="42" cy="12" r="3.5" fill="#fbbf24" />
        <text x="30" y="50" font-family="sans-serif" font-weight="bold" font-size="8" fill="#3b82f6" text-anchor="middle">.JPG</text>
    </g>
    <!-- Arrow in the middle -->
    <path d="M135,60 L150,60 L145,55 M150,60 L145,65" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <!-- PDF document on the right -->
    <g transform="translate(160, 30)">
        <rect x="0" y="0" width="60" height="75" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="2" />
        <rect x="0" y="0" width="60" height="24" rx="4" fill="#ef4444" />
        <text x="30" y="16" font-family="sans-serif" font-weight="bold" font-size="12" fill="#ffffff" text-anchor="middle">PDF</text>
        <line x1="12" y1="40" x2="48" y2="40" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round" />
        <line x1="12" y1="52" x2="48" y2="52" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round" />
        <line x1="12" y1="64" x2="35" y2="64" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round" />
    </g>

    </g>
</svg>
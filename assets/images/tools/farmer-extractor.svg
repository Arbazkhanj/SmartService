<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#eff6ff" />
            <stop offset="100%" stop-color="#dbeafe" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-blue" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#3b82f6" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-blue)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <!-- A4 Document sheet at the back -->
    <rect x="100" y="22" width="80" height="95" rx="4" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5" />
    <!-- Tractor / Leaf shield -->
    <rect x="110" y="32" width="60" height="50" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" />
    <!-- Wheat sheaf icon path -->
    <path d="M140,40 C132,45 132,60 140,75 C148,60 148,45 140,40 Z" fill="#34d399" />
    <path d="M140,40 C145,45 148,50 143,58 C138,55 135,50 140,40 Z" fill="#fbbf24" />
    <path d="M140,40 C135,45 132,50 137,58 C142,55 145,50 140,40 Z" fill="#fbbf24" />
    <!-- Extracted pocket card sliding out of the document -->
    <rect x="75" y="65" width="70" height="42" rx="4" fill="#ffffff" stroke="#10b981" stroke-width="2" />
    <rect x="80" y="72" width="12" height="15" rx="1" fill="#e2e8f0" />
    <rect x="97" y="74" width="30" height="2" fill="#cbd5e1" />
    <rect x="97" y="79" width="40" height="2" fill="#cbd5e1" />
    <rect x="97" y="84" width="20" height="2" fill="#cbd5e1" />
    <rect x="76" y="99" width="68" height="3" fill="#10b981" />

    </g>
</svg>
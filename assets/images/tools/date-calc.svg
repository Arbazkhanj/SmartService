<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fffbeb" />
            <stop offset="100%" stop-color="#fef3c7" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-amber" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#f59e0b" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-amber)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <!-- Desk Calendar card -->
    <rect x="75" y="25" width="70" height="85" rx="6" fill="#ffffff" stroke="#d97706" stroke-width="2" />
    <rect x="76" y="26" width="68" height="18" fill="#d97706" rx="4" />
    <!-- Clock overlapping on the right -->
    <circle cx="165" cy="70" r="28" fill="#ffffff" stroke="#f59e0b" stroke-width="3" />
    <circle cx="165" cy="70" r="2" fill="#f59e0b" />
    <line x1="165" y1="70" x2="165" y2="52" stroke="#1e293b" stroke-width="2" stroke-linecap="round" />
    <line x1="165" y1="70" x2="180" y2="70" stroke="#1e293b" stroke-width="2" stroke-linecap="round" />
    <!-- Tick ticks -->
    <line x1="165" y1="46" x2="165" y2="49" stroke="#f59e0b" stroke-width="2" />
    <line x1="189" y1="70" x2="192" y2="70" stroke="#f59e0b" stroke-width="2" />

    </g>
</svg>
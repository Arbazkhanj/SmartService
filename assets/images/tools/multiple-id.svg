<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#eff6ff" />
            <stop offset="100%" stop-color="#dbeafe" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-blue" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#3b82f6" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-blue)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <!-- A4 Paper -->
    <rect x="95" y="15" width="90" height="110" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <!-- Mini ID cards aligned in grid -->
    <rect x="103" y="24" width="34" height="22" rx="2" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" />
    <rect x="105" y="28" width="8" height="10" fill="#94a3b8" />
    <line x1="116" y1="28" x2="132" y2="28" stroke="#cbd5e1" stroke-width="1" />
    <line x1="116" y1="32" x2="128" y2="32" stroke="#cbd5e1" stroke-width="1" />

    <rect x="143" y="24" width="34" height="22" rx="2" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" />
    <rect x="145" y="28" width="8" height="10" fill="#94a3b8" />
    <line x1="156" y1="28" x2="172" y2="28" stroke="#cbd5e1" stroke-width="1" />
    <line x1="156" y1="32" x2="168" y2="32" stroke="#cbd5e1" stroke-width="1" />

    <rect x="103" y="52" width="34" height="22" rx="2" fill="#f0fdf4" stroke="#10b981" stroke-width="1" />
    <rect x="105" y="56" width="8" height="10" fill="#94a3b8" />
    <line x1="116" y1="56" x2="132" y2="56" stroke="#cbd5e1" stroke-width="1" />

    <rect x="143" y="52" width="34" height="22" rx="2" fill="#fffbeb" stroke="#f59e0b" stroke-width="1" />
    
    <rect x="103" y="80" width="34" height="22" rx="2" fill="#fdf2f8" stroke="#db2777" stroke-width="1" />

    </g>
</svg>
<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ecfdf5" />
            <stop offset="100%" stop-color="#d1fae5" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-green" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#10b981" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-green)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#10b981" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#10b981" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <rect x="75" y="25" width="130" height="85" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="2" />
    <!-- Image landscape drawing -->
    <circle cx="105" cy="45" r="7" fill="#d1fae5" />
    <path d="M76,85 L105,60 L135,80 L175,45 L204,85 Z" fill="#f0fdf4" stroke="#a7f3d0" stroke-width="1.5" />
    
    <!-- L-shaped cropping corners -->
    <path d="M 90 45 L 90 35 L 100 35" fill="none" stroke="#ef4444" stroke-width="3" />
    <path d="M 190 45 L 190 35 L 180 35" fill="none" stroke="#ef4444" stroke-width="3" />
    <path d="M 90 85 L 90 95 L 100 95" fill="none" stroke="#ef4444" stroke-width="3" />
    <path d="M 190 85 L 190 95 L 180 95" fill="none" stroke="#ef4444" stroke-width="3" />
    
    <!-- Bottom format badge -->
    <rect x="110" y="85" width="60" height="18" rx="4" fill="#10b981" />
    <text x="140" y="97" fill="#ffffff" font-family="sans-serif" font-size="9" font-weight="bold" text-anchor="middle">JPG ➔ WEBP</text>

    </g>
</svg>
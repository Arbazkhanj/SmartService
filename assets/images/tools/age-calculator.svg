<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fffbeb" />
            <stop offset="100%" stop-color="#fef3c7" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-amber" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#f59e0b" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-amber)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <!-- Desk Calendar sheet -->
    <rect x="75" y="28" width="70" height="80" rx="6" fill="#ffffff" stroke="#d97706" stroke-width="2" />
    <rect x="76" y="29" width="68" height="18" fill="#d97706" rx="4" />
    <!-- Calendar grid lines -->
    <circle cx="90" cy="60" r="3" fill="#f59e0b" />
    <circle cx="110" cy="60" r="3" fill="#f59e0b" />
    <circle cx="130" cy="60" r="3" fill="#f59e0b" />
    <circle cx="90" cy="80" r="3" fill="#cbd5e1" />
    <circle cx="110" cy="80" r="3" fill="#cbd5e1" />
    <circle cx="130" cy="80" r="3" fill="#cbd5e1" />
    <!-- Birthday cake overlayed -->
    <g transform="translate(135, 50)">
        <rect x="5" y="20" width="60" height="34" rx="4" fill="#fef08a" stroke="#d97706" stroke-width="2" />
        <rect x="15" y="10" width="40" height="10" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" />
        <!-- Candles -->
        <line x1="25" y1="10" x2="25" y2="4" stroke="#ef4444" stroke-width="2" />
        <line x1="35" y1="10" x2="35" y2="4" stroke="#ef4444" stroke-width="2" />
        <line x1="45" y1="10" x2="45" y2="4" stroke="#ef4444" stroke-width="2" />
        <circle cx="25" cy="2" r="1.5" fill="#f59e0b" />
        <circle cx="35" cy="2" r="1.5" fill="#f59e0b" />
        <circle cx="45" cy="2" r="1.5" fill="#f59e0b" />
    </g>

    </g>
</svg>
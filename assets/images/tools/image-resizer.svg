<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#eff6ff" />
            <stop offset="100%" stop-color="#dbeafe" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-blue" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#3b82f6" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-blue)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <!-- Outer Image Container -->
    <rect x="75" y="25" width="130" height="85" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <!-- Landscape drawing inside -->
    <path d="M76,85 L105,60 L135,80 L175,45 L204,85 Z" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" />
    <circle cx="105" cy="45" r="7" fill="#fbbf24" />
    <!-- Resizer Diagonal Handle lines pointing inwards -->
    <line x1="65" y1="15" x2="85" y2="35" stroke="#2563eb" stroke-width="2" stroke-linecap="round" />
    <path d="M85,27 L85,35 L77,35" fill="none" stroke="#2563eb" stroke-width="2" stroke-linejoin="round" />
    <line x1="215" y1="120" x2="195" y2="100" stroke="#2563eb" stroke-width="2" stroke-linecap="round" />
    <path d="M195,108 L195,100 L203,100" fill="none" stroke="#2563eb" stroke-width="2" stroke-linejoin="round" />
    <!-- Badge showing output compression -->
    <rect x="110" y="80" width="60" height="20" rx="10" fill="#2563eb" />
    <text x="140" y="94" fill="#ffffff" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">50 KB</text>

    </g>
</svg>
<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ecfdf5" />
            <stop offset="100%" stop-color="#d1fae5" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-green" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#10b981" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-green)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#10b981" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#10b981" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <!-- Overlapping sheets representing PDF documents merging -->
    <g transform="translate(75, 25)">
        <!-- Document 1 -->
        <rect x="0" y="15" width="55" height="75" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
        <rect x="0" y="15" width="55" height="16" rx="4" fill="#cbd5e1" />
        <!-- Document 2 -->
        <rect x="20" y="8" width="55" height="75" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" />
        <rect x="20" y="8" width="55" height="16" rx="4" fill="#94a3b8" />
        <!-- Target Document -->
        <rect x="40" y="0" width="65" height="85" rx="4" fill="#ffffff" stroke="#10b981" stroke-width="2" />
        <rect x="40" y="0" width="65" height="20" rx="4" fill="#10b981" />
        <text x="72" y="14" font-family="sans-serif" font-weight="bold" font-size="10" fill="#ffffff" text-anchor="middle">PDF</text>
        
        <!-- Plus sign / merge symbol -->
        <circle cx="8" cy="74" r="14" fill="#10b981" />
        <line x1="3" y1="74" x2="13" y2="74" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
        <line x1="8" y1="69" x2="8" y2="79" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
    </g>

    </g>
</svg>
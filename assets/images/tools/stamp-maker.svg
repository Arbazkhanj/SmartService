<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#eff6ff" />
            <stop offset="100%" stop-color="#dbeafe" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-blue" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#3b82f6" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-blue)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <g transform="translate(90, 20) rotate(-10, 50, 50)">
        <!-- Outer Stamp Rings -->
        <circle cx="50" cy="50" r="48" fill="none" stroke="#2563eb" stroke-width="3" />
        <circle cx="50" cy="50" r="42" fill="none" stroke="#2563eb" stroke-width="1" />
        <circle cx="50" cy="50" r="30" fill="none" stroke="#2563eb" stroke-width="1.5" />
        <!-- Circular dots / star elements inside ring -->
        <circle cx="16" cy="50" r="2" fill="#2563eb" />
        <circle cx="84" cy="50" r="2" fill="#2563eb" />
        <!-- Stamp Text -->
        <text x="50" y="47" font-family="sans-serif" font-weight="bold" font-size="7" fill="#2563eb" text-anchor="middle">COMMON SEVA</text>
        <text x="50" y="58" font-family="sans-serif" font-weight="bold" font-size="8" fill="#2563eb" text-anchor="middle">APPROVED</text>
        <text x="50" y="67" font-family="sans-serif" font-weight="bold" font-size="6" fill="#2563eb" text-anchor="middle">★ DIGITAL ★</text>
    </g>

    </g>
</svg>
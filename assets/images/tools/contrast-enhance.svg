<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ecfdf5" />
            <stop offset="100%" stop-color="#d1fae5" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-green" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#10b981" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-green)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#10b981" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#10b981" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <rect x="75" y="25" width="130" height="85" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="2" />
    <!-- Split screen illustration: left is dark/dull, right is vivid -->
    <g>
        <clipPath id="leftHalf">
            <rect x="76" y="26" width="64" height="83" />
        </clipPath>
        <clipPath id="rightHalf">
            <rect x="140" y="26" width="64" height="83" />
        </clipPath>
        
        <!-- Background graphics -->
        <g clip-path="url(#leftHalf)">
            <rect x="76" y="26" width="128" height="83" fill="#94a3b8" />
            <circle cx="140" cy="65" r="25" fill="#cbd5e1" />
        </g>
        <g clip-path="url(#rightHalf)">
            <rect x="76" y="26" width="128" height="83" fill="#34d399" />
            <circle cx="140" cy="65" r="25" fill="#fef08a" />
        </g>
    </g>
    <!-- Sliders controller at the bottom -->
    <line x1="90" y1="100" x2="190" y2="100" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round" />
    <circle cx="140" cy="100" r="6" fill="#10b981" />

    </g>
</svg>
<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fffbeb" />
            <stop offset="100%" stop-color="#fef3c7" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-amber" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#f59e0b" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-amber)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <!-- Pie chart -->
    <circle cx="110" cy="70" r="35" fill="#f59e0b" />
    <!-- Pie slice (interest share) -->
    <path d="M110,70 L110,35 A35,35 0 0,1 145,70 Z" fill="#fbbf24" />
    <!-- Chart center donut hole -->
    <circle cx="110" cy="70" r="16" fill="#fef3c7" />
    <!-- Miniature building representing housing loan -->
    <g transform="translate(160, 40)">
        <rect x="5" y="15" width="30" height="40" rx="2" fill="#ffffff" stroke="#d97706" stroke-width="2" />
        <rect x="10" y="5" width="20" height="10" fill="#fef3c7" stroke="#d97706" />
        <!-- Windows -->
        <rect x="10" y="20" width="6" height="6" fill="#fbbf24" />
        <rect x="24" y="20" width="6" height="6" fill="#fbbf24" />
        <rect x="10" y="32" width="6" height="6" fill="#fbbf24" />
        <rect x="24" y="32" width="6" height="6" fill="#fbbf24" />
    </g>

    </g>
</svg>
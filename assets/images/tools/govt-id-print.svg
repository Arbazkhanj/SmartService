<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#eff6ff" />
            <stop offset="100%" stop-color="#dbeafe" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-blue" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#3b82f6" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-blue)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <rect x="85" y="30" width="110" height="70" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <rect x="86" y="31" width="108" height="12" rx="4" fill="#3b82f6" />
    <!-- Photo slot -->
    <rect x="94" y="52" width="22" height="28" rx="2" fill="#e2e8f0" />
    <circle cx="105" cy="62" r="5" fill="#94a3b8" />
    <path d="M96,78 C96,70 114,70 114,78 Z" fill="#94a3b8" />
    <!-- Text mockups -->
    <rect x="123" y="54" width="40" height="3" rx="1.5" fill="#cbd5e1" />
    <rect x="123" y="61" width="60" height="3" rx="1.5" fill="#cbd5e1" />
    <rect x="123" y="68" width="50" height="3" rx="1.5" fill="#cbd5e1" />
    <!-- Aadhaar-like red-blue bottom block -->
    <rect x="86" y="88" width="108" height="4" fill="#ef4444" />
    <rect x="86" y="92" width="108" height="4" fill="#10b981" />

    </g>
</svg>
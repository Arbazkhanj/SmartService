<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fdf2f8" />
            <stop offset="100%" stop-color="#fce7f3" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-pink" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#db2777" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-pink)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#db2777" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#db2777" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <!-- White Sheet -->
    <rect x="95" y="20" width="90" height="100" rx="4" fill="#ffffff" stroke="#db2777" stroke-width="2" />
    <!-- Header banner -->
    <rect x="105" y="30" width="30" height="8" rx="2" fill="#cbd5e1" />
    <rect x="155" y="30" width="20" height="8" rx="2" fill="#db2777" />
    <!-- Bill details grid -->
    <rect x="105" y="46" width="70" height="6" fill="#f3f4f6" />
    <rect x="105" y="56" width="35" height="3" fill="#cbd5e1" />
    <rect x="155" y="56" width="20" height="3" fill="#cbd5e1" />
    <rect x="105" y="64" width="40" height="3" fill="#cbd5e1" />
    <rect x="155" y="64" width="20" height="3" fill="#cbd5e1" />
    <rect x="105" y="72" width="25" height="3" fill="#cbd5e1" />
    <rect x="155" y="72" width="20" height="3" fill="#cbd5e1" />
    <line x1="105" y1="84" x2="175" y2="84" stroke="#db2777" stroke-width="1.5" />
    <!-- Total box -->
    <rect x="140" y="92" width="35" height="14" rx="2" fill="#fce7f3" />
    <rect x="145" y="97" width="25" height="4" fill="#db2777" />

    </g>
</svg>
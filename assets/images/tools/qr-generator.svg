<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ecfdf5" />
            <stop offset="100%" stop-color="#d1fae5" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-green" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#10b981" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-green)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#10b981" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#10b981" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <rect x="90" y="20" width="100" height="100" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="2" />
    <!-- QR Corner squares -->
    <rect x="98" y="28" width="20" height="20" fill="none" stroke="#0f172a" stroke-width="4" />
    <rect x="103" y="33" width="10" height="10" fill="#0f172a" />
    
    <rect x="162" y="28" width="20" height="20" fill="none" stroke="#0f172a" stroke-width="4" />
    <rect x="167" y="33" width="10" height="10" fill="#0f172a" />
    
    <rect x="98" y="92" width="20" height="20" fill="none" stroke="#0f172a" stroke-width="4" />
    <rect x="103" y="97" width="10" height="10" fill="#0f172a" />
    
    <!-- QR Random matrix cells -->
    <rect x="130" y="30" width="6" height="6" fill="#0f172a" />
    <rect x="145" y="35" width="6" height="6" fill="#0f172a" />
    <rect x="138" y="42" width="12" height="6" fill="#0f172a" />
    <rect x="130" y="55" width="6" height="12" fill="#0f172a" />
    <rect x="148" y="52" width="6" height="6" fill="#0f172a" />
    <rect x="160" y="60" width="12" height="6" fill="#0f172a" />
    <rect x="138" y="68" width="6" height="6" fill="#0f172a" />
    <rect x="148" y="74" width="12" height="6" fill="#0f172a" />
    <rect x="130" y="85" width="6" height="6" fill="#0f172a" />
    <rect x="140" y="88" width="6" height="12" fill="#0f172a" />
    <rect x="164" y="82" width="12" height="12" fill="#0f172a" />

    </g>
</svg>
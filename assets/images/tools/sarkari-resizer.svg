<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#eff6ff" />
            <stop offset="100%" stop-color="#dbeafe" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-blue" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#3b82f6" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-blue)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <!-- Layout box A -->
    <rect x="70" y="30" width="65" height="65" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <text x="102" y="60" font-family="sans-serif" font-weight="bold" font-size="10" fill="#3b82f6" text-anchor="middle">213 x 213</text>
    <text x="102" y="74" font-family="sans-serif" font-size="8" fill="#64748b" text-anchor="middle">PAN Preset</text>
    <!-- Layout box B overlapping -->
    <rect x="135" y="45" width="75" height="45" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="2" />
    <text x="172" y="72" font-family="sans-serif" font-weight="bold" font-size="10" fill="#10b981" text-anchor="middle">&lt; 30 KB</text>
    <!-- Resize cycle symbol -->
    <path d="M140,25 A20,20 0 0,1 155,42" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" />

    </g>
</svg>
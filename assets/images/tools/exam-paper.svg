<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fdf2f8" />
            <stop offset="100%" stop-color="#fce7f3" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-pink" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#db2777" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-pink)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#db2777" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#db2777" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <!-- Double column paper sheet -->
    <rect x="95" y="15" width="90" height="110" rx="4" fill="#ffffff" stroke="#db2777" stroke-width="2" />
    <!-- Header -->
    <rect x="105" y="24" width="70" height="8" rx="2" fill="#cbd5e1" />
    <!-- Divider -->
    <line x1="140" y1="40" x2="140" y2="110" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="2 2" />
    <!-- Left Column Lines -->
    <rect x="103" y="42" width="30" height="3" fill="#cbd5e1" />
    <rect x="103" y="50" width="32" height="2" fill="#e2e8f0" />
    <rect x="103" y="56" width="25" height="2" fill="#e2e8f0" />
    <rect x="103" y="62" width="32" height="2" fill="#e2e8f0" />

    <rect x="103" y="74" width="30" height="3" fill="#cbd5e1" />
    <rect x="103" y="82" width="32" height="2" fill="#e2e8f0" />

    <!-- Right Column Lines -->
    <rect x="147" y="42" width="30" height="3" fill="#cbd5e1" />
    <rect x="147" y="50" width="32" height="2" fill="#e2e8f0" />
    <rect x="147" y="56" width="32" height="2" fill="#e2e8f0" />
    
    <rect x="147" y="68" width="30" height="3" fill="#cbd5e1" />
    <!-- Total mark bubble in red -->
    <circle cx="172" cy="98" r="12" fill="#fecdd3" stroke="#f43f5e" stroke-width="1.5" />
    <text x="172" y="102" font-family="sans-serif" font-weight="bold" font-size="9" fill="#f43f5e" text-anchor="middle">A+</text>

    </g>
</svg>
<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fdf2f8" />
            <stop offset="100%" stop-color="#fce7f3" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-pink" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#db2777" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-pink)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#db2777" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#db2777" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <!-- Sheet document -->
    <rect x="95" y="15" width="90" height="110" rx="4" fill="#ffffff" stroke="#db2777" stroke-width="2" />
    <line x1="105" y1="28" x2="175" y2="28" stroke="#db2777" stroke-width="2" />
    <!-- Text contents -->
    <rect x="105" y="38" width="70" height="3" fill="#cbd5e1" />
    <rect x="105" y="46" width="70" height="3" fill="#cbd5e1" />
    <!-- House icon in the center -->
    <g transform="translate(125, 58)">
        <polygon points="15,0 30,12 0,12" fill="#db2777" />
        <rect x="3" y="12" width="24" height="18" fill="#fbcfe8" stroke="#db2777" stroke-width="1" />
        <rect x="11" y="20" width="8" height="10" fill="#db2777" />
    </g>
    <!-- Key overlay -->
    <g transform="translate(70, 75)">
        <circle cx="12" cy="12" r="8" fill="none" stroke="#fbbf24" stroke-width="3" />
        <rect x="20" y="9" width="22" height="6" fill="#fbbf24" />
        <rect x="30" y="15" width="4" height="6" fill="#fbbf24" />
        <rect x="37" y="15" width="4" height="6" fill="#fbbf24" />
    </g>

    </g>
</svg>
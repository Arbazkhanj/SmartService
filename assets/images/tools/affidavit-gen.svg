<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fdf2f8" />
            <stop offset="100%" stop-color="#fce7f3" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-pink" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#db2777" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-pink)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#db2777" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#db2777" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <!-- Stamp Document sheet -->
    <rect x="95" y="15" width="90" height="110" rx="4" fill="#ffffff" stroke="#db2777" stroke-width="2" />
    <!-- Standard Stamp Header (red seal) -->
    <rect x="105" y="25" width="70" height="18" fill="#fecdd3" stroke="#f43f5e" stroke-width="1" />
    <circle cx="140" cy="34" r="6" fill="#f43f5e" />
    <!-- Document content mockup lines -->
    <rect x="105" y="52" width="70" height="3" fill="#cbd5e1" />
    <rect x="105" y="60" width="70" height="3" fill="#cbd5e1" />
    <rect x="105" y="68" width="50" height="3" fill="#cbd5e1" />
    <!-- Gavel laying diagonally in front -->
    <g transform="translate(60, 50) rotate(-35, 30, 30)">
        <!-- Gavel Handle -->
        <rect x="25" y="45" width="50" height="6" rx="2" fill="#b45309" />
        <!-- Gavel Head -->
        <rect x="15" y="33" width="20" height="30" rx="4" fill="#d97706" />
        <rect x="10" y="38" width="30" height="20" rx="2" fill="#78350f" />
    </g>

    </g>
</svg>
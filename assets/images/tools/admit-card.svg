<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#eff6ff" />
            <stop offset="100%" stop-color="#dbeafe" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-blue" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#3b82f6" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-blue)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <!-- Sheet document -->
    <rect x="95" y="15" width="90" height="110" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <!-- Header banner -->
    <rect x="105" y="24" width="70" height="8" rx="2" fill="#3b82f6" />
    <!-- Grid elements representing subject timetable -->
    <rect x="105" y="40" width="70" height="35" fill="none" stroke="#cbd5e1" stroke-width="1" />
    <line x1="105" y1="48" x2="175" y2="48" stroke="#cbd5e1" stroke-width="1" />
    <line x1="105" y1="56" x2="175" y2="56" stroke="#cbd5e1" stroke-width="1" />
    <line x1="105" y1="64" x2="175" y2="64" stroke="#cbd5e1" stroke-width="1" />
    <line x1="128" y1="40" x2="128" y2="75" stroke="#cbd5e1" stroke-width="1" />
    <line x1="152" y1="40" x2="152" y2="75" stroke="#cbd5e1" stroke-width="1" />
    <!-- Big red APPROVED stamp overlay -->
    <g transform="translate(138, 70) rotate(-12)">
        <rect x="-22" y="-8" width="44" height="16" fill="#fecdd3" stroke="#f43f5e" stroke-width="1" opacity="0.95" />
        <text x="0" y="4" font-family="sans-serif" font-weight="bold" font-size="7" fill="#f43f5e" text-anchor="middle">ENTRY PASS</text>
    </g>
    <!-- Photo slot in top right -->
    <rect x="156" y="22" width="16" height="15" fill="#cbd5e1" />

    </g>
</svg>
<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ecfdf5" />
            <stop offset="100%" stop-color="#d1fae5" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-green" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#10b981" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-green)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#10b981" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#10b981" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <!-- Checkerboard backdrop showing transparency -->
    <rect x="80" y="30" width="120" height="80" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="2" />
    <g fill="#cbd5e1" opacity="0.5">
        <rect x="140" y="31" width="10" height="10" /> <rect x="160" y="31" width="10" height="10" /> <rect x="180" y="31" width="10" height="10" />
        <rect x="150" y="41" width="10" height="10" /> <rect x="170" y="41" width="10" height="10" /> <rect x="190" y="41" width="10" height="10" />
        <rect x="140" y="51" width="10" height="10" /> <rect x="160" y="51" width="10" height="10" /> <rect x="180" y="51" width="10" height="10" />
        <rect x="150" y="61" width="10" height="10" /> <rect x="170" y="61" width="10" height="10" /> <rect x="190" y="61" width="10" height="10" />
        <rect x="140" y="71" width="10" height="10" /> <rect x="160" y="71" width="10" height="10" /> <rect x="180" y="71" width="10" height="10" />
        <rect x="150" y="81" width="10" height="10" /> <rect x="170" y="81" width="10" height="10" /> <rect x="190" y="81" width="10" height="10" />
        <rect x="140" y="91" width="10" height="10" /> <rect x="160" y="91" width="10" height="10" /> <rect x="180" y="91" width="10" height="10" />
    </g>
    <!-- Portrait silhouette showing cutout -->
    <path d="M140,40 C148,40 152,48 152,58 C152,68 140,72 140,72 C140,72 128,68 128,58 C128,48 132,40 140,40 Z" fill="#93c5fd" stroke="#3b82f6" stroke-width="1.5" />
    <path d="M115,96 C115,82 165,82 165,96 Z" fill="#93c5fd" stroke="#3b82f6" stroke-width="1.5" />
    <!-- Scissors overlay -->
    <g transform="translate(170, 70)">
        <circle cx="5" cy="5" r="4" fill="none" stroke="#ef4444" stroke-width="2" />
        <circle cx="5" cy="15" r="4" fill="none" stroke="#ef4444" stroke-width="2" />
        <line x1="9" y1="8" x2="22" y2="13" stroke="#ef4444" stroke-width="2" />
        <line x1="9" y1="12" x2="22" y2="7" stroke="#ef4444" stroke-width="2" />
    </g>

    </g>
</svg>
<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ecfdf5" />
            <stop offset="100%" stop-color="#d1fae5" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-green" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#10b981" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-green)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#10b981" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#10b981" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <!-- Red PDF Document sheet -->
    <rect x="95" y="18" width="90" height="100" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="2" />
    <rect x="95" y="18" width="90" height="20" rx="4" fill="#ef4444" />
    <text x="140" y="32" font-family="sans-serif" font-weight="bold" font-size="10" fill="#ffffff" text-anchor="middle">PDF</text>
    <!-- Document lines -->
    <rect x="105" y="48" width="70" height="3" fill="#cbd5e1" />
    <rect x="105" y="58" width="70" height="3" fill="#cbd5e1" />
    <rect x="105" y="68" width="70" height="3" fill="#cbd5e1" />
    <!-- Diagonal Shield text watermark -->
    <g transform="translate(140, 75) rotate(-20)">
        <rect x="-55" y="-12" width="110" height="24" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="2" opacity="0.9" />
        <text x="0" y="4" font-family="sans-serif" font-weight="bold" font-size="10" fill="#10b981" text-anchor="middle">SECURE</text>
    </g>

    </g>
</svg>
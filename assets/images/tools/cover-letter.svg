<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fdf2f8" />
            <stop offset="100%" stop-color="#fce7f3" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-pink" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#db2777" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-pink)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#db2777" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#db2777" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <!-- Envelope at the bottom -->
    <g transform="translate(85, 45)">
        <rect x="0" y="0" width="110" height="70" rx="8" fill="#db2777" />
        <polygon points="0,0 55,38 110,0" fill="#be185d" />
        <polygon points="0,70 55,34 110,70" fill="#9d174d" opacity="0.4" />
    </g>
    <!-- Letter page sliding upwards -->
    <rect x="95" y="15" width="90" height="65" rx="4" fill="#ffffff" stroke="#fbcfe8" stroke-width="2" />
    <!-- Lines of letter -->
    <rect x="105" y="25" width="70" height="3" rx="1" fill="#cbd5e1" />
    <rect x="105" y="32" width="60" height="3" rx="1" fill="#cbd5e1" />
    <rect x="105" y="39" width="65" height="3" rx="1" fill="#cbd5e1" />
    <rect x="105" y="46" width="45" height="3" rx="1" fill="#cbd5e1" />

    </g>
</svg>
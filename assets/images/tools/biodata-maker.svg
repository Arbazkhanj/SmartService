<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fdf2f8" />
            <stop offset="100%" stop-color="#fce7f3" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-pink" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#db2777" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-pink)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#db2777" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#db2777" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <!-- Invitation / Wedding frame card -->
    <rect x="90" y="20" width="100" height="100" rx="12" fill="#ffffff" stroke="#db2777" stroke-width="2" />
    <rect x="96" y="26" width="88" height="88" rx="8" fill="none" stroke="#fbcfe8" stroke-dasharray="4 3" stroke-width="1.5" />
    <!-- Beautiful floral corners -->
    <path d="M96,36 C96,26 106,26 106,26" fill="none" stroke="#db2777" stroke-width="2" />
    <path d="M184,36 C184,26 174,26 174,26" fill="none" stroke="#db2777" stroke-width="2" />
    <path d="M96,104 C96,114 106,114 106,114" fill="none" stroke="#db2777" stroke-width="2" />
    <path d="M184,104 C184,114 174,114 174,114" fill="none" stroke="#db2777" stroke-width="2" />
    <!-- Concentric Hearts in center -->
    <g transform="translate(120, 48)">
        <path d="M20,15 C20,10 5,10 5,25 C5,40 20,50 20,50 C20,50 35,40 35,25 C35,10 20,10 20,15 Z" fill="#db2777" />
        <path d="M20,20 C20,16 9,16 9,27 C9,37 20,44 20,44 C20,44 31,37 31,27 C31,16 20,16 20,20 Z" fill="#fdf2f8" opacity="0.3" />
    </g>

    </g>
</svg>
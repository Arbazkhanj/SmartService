<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fffbeb" />
            <stop offset="100%" stop-color="#fef3c7" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-amber" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#f59e0b" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-amber)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <!-- Scales background base -->
    <rect x="90" y="85" width="100" height="8" rx="2" fill="#cbd5e1" />
    <!-- Gold coins stacking -->
    <g transform="translate(95, 45)">
        <ellipse cx="20" cy="35" rx="15" ry="5" fill="#f59e0b" stroke="#b45309" />
        <ellipse cx="20" cy="28" rx="15" ry="5" fill="#fbbf24" stroke="#b45309" />
        <ellipse cx="20" cy="21" rx="15" ry="5" fill="#f59e0b" stroke="#b45309" />
        <ellipse cx="20" cy="14" rx="15" ry="5" fill="#fbbf24" stroke="#b45309" />
    </g>
    <!-- Silver bricks stacking -->
    <g transform="translate(140, 50)">
        <rect x="0" y="20" width="35" height="15" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5" />
        <polygon points="5,5 30,5 35,20 0,20" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" />
    </g>

    </g>
</svg>
<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#eff6ff" />
            <stop offset="100%" stop-color="#dbeafe" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-blue" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#3b82f6" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-blue)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <!-- Joined Container -->
    <rect x="100" y="20" width="80" height="100" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <!-- Upper Photo Box -->
    <rect x="108" y="28" width="64" height="48" rx="2" fill="#eff6ff" stroke="#93c5fd" />
    <circle cx="140" cy="45" r="9" fill="#3b82f6" opacity="0.8" />
    <path d="M122,68 C122,57 158,57 158,68 Z" fill="#3b82f6" opacity="0.8" />
    <!-- Lower Signature Box -->
    <rect x="108" y="82" width="64" height="30" rx="2" fill="#f8fafc" stroke="#93c5fd" />
    <path d="M115,102 Q125,90 135,98 T155,94 T165,100" fill="none" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round" />
    <!-- Chain Join Link Badge -->
    <circle cx="140" cy="79" r="8" fill="#10b981" />
    <path d="M136,79 L144,79 M140,75 L140,83" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />

    </g>
</svg>
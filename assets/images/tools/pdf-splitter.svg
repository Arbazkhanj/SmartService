<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ecfdf5" />
            <stop offset="100%" stop-color="#d1fae5" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-green" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#10b981" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-green)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#10b981" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#10b981" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <g transform="translate(75, 25)">
        <!-- PDF Document sheet -->
        <rect x="20" y="5" width="90" height="80" rx="4" fill="#ffffff" stroke="#10b981" stroke-width="2" />
        <rect x="20" y="5" width="90" height="18" rx="4" fill="#10b981" />
        <text x="65" y="17" font-family="sans-serif" font-weight="bold" font-size="10" fill="#ffffff" text-anchor="middle">PDF DOC</text>
        
        <!-- Split cut line indicator -->
        <line x1="65" y1="28" x2="65" y2="85" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 3" />
        
        <!-- Scissors overlay -->
        <g transform="translate(50, 42)">
            <circle cx="5" cy="5" r="5" fill="none" stroke="#ef4444" stroke-width="2" />
            <circle cx="5" cy="20" r="5" fill="none" stroke="#ef4444" stroke-width="2" />
            <line x1="9" y1="8" x2="25" y2="16" stroke="#ef4444" stroke-width="2" />
            <line x1="9" y1="17" x2="25" y2="9" stroke="#ef4444" stroke-width="2" />
        </g>
    </g>

    </g>
</svg>
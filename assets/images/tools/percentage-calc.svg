<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" width="280" height="140">
    <defs>
        
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fffbeb" />
            <stop offset="100%" stop-color="#fef3c7" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <rect width="280" height="140" fill="url(#bgGrad)" />
    
    <g opacity="0.08">
        <pattern id="grid-amber" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#f59e0b" stroke-width="1"/>
        </pattern>
        <rect width="280" height="140" fill="url(#grid-amber)" />
    </g>
    
    <!-- Abstract background circles -->
    <circle cx="30" cy="110" r="30" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.1" />
    <circle cx="250" cy="30" r="40" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.1" />
    
    <!-- Central Content Group -->
    <g filter="url(#shadow)">
        
    <!-- Large amber percentage sign -->
    <circle cx="110" cy="50" r="12" fill="none" stroke="#d97706" stroke-width="4" />
    <line x1="100" y1="90" x2="180" y2="30" stroke="#d97706" stroke-width="6" stroke-linecap="round" />
    <circle cx="170" cy="70" r="12" fill="none" stroke="#d97706" stroke-width="4" />
    <!-- Trend Arrows -->
    <g transform="translate(195, 40)">
        <path d="M 0 10 L 10 0 L 20 10" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
        <line x1="10" y1="0" x2="10" y2="25" stroke="#10b981" stroke-width="3" stroke-linecap="round" />
    </g>
    <g transform="translate(65, 60)">
        <path d="M 0 15 L 10 25 L 20 15" fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
        <line x1="10" y1="25" x2="10" y2="0" stroke="#ef4444" stroke-width="3" stroke-linecap="round" />
    </g>

    </g>
</svg>
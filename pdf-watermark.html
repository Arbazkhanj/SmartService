<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline PDF Watermark Creator - SmartService</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .editor-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 32px;
            margin-top: 24px;
        }
        .preview-pane {
            background: #475569;
            border-radius: var(--radius-lg);
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            border: 1px solid var(--border-color);
            position: relative;
        }
        .pdf-page-preview {
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            height: 650px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border-radius: var(--radius-sm);
        }
        .watermark-overlay-text {
            position: absolute;
            font-weight: 800;
            color: rgba(239, 68, 68, 0.3);
            pointer-events: none;
            user-select: none;
            text-transform: uppercase;
            text-align: center;
            white-space: nowrap;
        }
        
        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: var(--radius-lg);
            padding: 50px 24px;
            text-align: center;
            background: #f8fafc;
            cursor: pointer;
            transition: var(--transition-normal);
        }
        .upload-area:hover {
            border-color: var(--primary);
            background: var(--primary-light);
        }
        
        @media (max-width: 992px) {
            .editor-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body style="padding-top: 70px;">
    <site-header></site-header>

    <main class="container section-padding" style="padding-top: 20px;">
        <div style="margin-bottom: 24px;">
            <a href="index.html" style="color: var(--primary); font-weight: 600;"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
            <h1 style="font-size: 2.2rem; margin-top: 12px; color: var(--text-main);"><i class="fas fa-file-pdf mr-2 text-primary"></i> PDF Watermark Utility</h1>
            <p style="color: var(--text-muted);">Add secure text overlays and watermarks to PDF files 100% locally in your browser memory.</p>
        </div>

        <div class="card" style="padding: 24px;">
            <!-- Upload Zone -->
            <div class="upload-area" id="pdfUploadZone">
                <i class="fas fa-file-pdf" style="font-size: 4rem; color: #ef4444; margin-bottom: 20px;"></i>
                <h3 style="margin-bottom: 8px;">Select a PDF File</h3>
                <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 20px;">Drag your document PDF file here, or click to browse local storage.</p>
                <input type="file" id="pdfFile" accept="application/pdf" style="display: none;">
                <button class="btn btn-primary" onclick="document.getElementById('pdfFile').click()"><i class="fas fa-folder-open"></i> Browse Files</button>
            </div>

            <!-- Workspace Editor -->
            <div class="editor-grid" id="pdfEditor" style="display: none;">
                
                <!-- Settings Control Panel -->
                <div class="control-group">
                    <h3 style="font-size: 1.15rem; margin-bottom: 16px;"><i class="fas fa-sliders-h text-primary"></i> Watermark Overlays</h3>
                    
                    <div class="form-group">
                        <label class="control-label">Watermark Text</label>
                        <input type="text" class="form-control" id="wmText" value="CONFIDENTIAL" placeholder="e.g. APPROVED, CONFIDENTIAL, COPY">
                    </div>

                    <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <div>
                            <label class="control-label">Text Color</label>
                            <select class="form-control" id="wmColor">
                                <option value="#ef4444">Bright Red</option>
                                <option value="#64748b">Slate Gray</option>
                                <option value="#3b82f6">Ocean Blue</option>
                                <option value="#22c55e">Green Pass</option>
                            </select>
                        </div>
                        <div>
                            <label class="control-label">Font Family</label>
                            <select class="form-control" id="wmFont">
                                <option value="Helvetica">Helvetica</option>
                                <option value="Times-Roman">Times Roman</option>
                                <option value="Courier">Courier</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="control-label">Font Size (<span id="fontSizeVal">50</span>px)</label>
                        <input type="range" class="control-slider" id="wmSize" min="15" max="120" value="50">
                    </div>

                    <div class="form-group">
                        <label class="control-label">Opacity (<span id="opacityVal">0.3</span>)</label>
                        <input type="range" class="control-slider" id="wmOpacity" min="10" max="100" value="30">
                    </div>

                    <div class="form-group">
                        <label class="control-label">Rotation Angle (<span id="angleVal">45</span>°)</label>
                        <input type="range" class="control-slider" id="wmAngle" min="-90" max="90" value="45">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Page Selection</label>
                        <div style="display: flex; gap: 16px;">
                            <label><input type="radio" name="wmPageOption" value="all" checked> All Pages</label>
                            <label><input type="radio" name="wmPageOption" value="first"> First Page Only</label>
                        </div>
                    </div>

                    <button class="btn btn-primary" id="downloadPdfBtn" style="width: 100%; margin-top: 12px;"><i class="fas fa-download"></i> Apply &amp; Save PDF</button>
                </div>

                <!-- Page Mockup Preview -->
                <div class="preview-pane">
                    <div class="pdf-page-preview" id="pagePreviewContainer">
                        <i class="fas fa-file-pdf" style="font-size: 6rem; color: #cbd5e1; z-index: 1;"></i>
                        <span style="position: absolute; bottom: 20px; color: var(--text-light); z-index: 1;" id="pdfInfoDisplay">document.pdf</span>
                        <div class="watermark-overlay-text" id="watermarkPreview">CONFIDENTIAL</div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <site-footer></site-footer>

    <!-- Load pdf-lib from cdn -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="assets/js/components.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const pdfFile = document.getElementById("pdfFile");
            const pdfUploadZone = document.getElementById("pdfUploadZone");
            const pdfEditor = document.getElementById("pdfEditor");
            
            let pdfBytesArray = null;
            let currentFileName = "document.pdf";

            pdfFile.addEventListener("change", (e) => {
                const file = e.target.files[0];
                if (!file) return;

                currentFileName = file.name;
                document.getElementById("pdfInfoDisplay").innerText = file.name;

                const reader = new FileReader();
                reader.onload = (event) => {
                    pdfBytesArray = event.target.result;
                    pdfUploadZone.style.display = "none";
                    pdfEditor.style.display = "grid";
                    updatePreview();
                };
                reader.readAsArrayBuffer(file);
            });

            // Live Update Elements
            const wmText = document.getElementById("wmText");
            const wmColor = document.getElementById("wmColor");
            const wmSize = document.getElementById("wmSize");
            const wmOpacity = document.getElementById("wmOpacity");
            const wmAngle = document.getElementById("wmAngle");
            const wmFont = document.getElementById("wmFont");

            const watermarkPreview = document.getElementById("watermarkPreview");

            [wmText, wmColor, wmSize, wmOpacity, wmAngle, wmFont].forEach(el => {
                el.addEventListener("input", updatePreview);
                el.addEventListener("change", updatePreview);
            });

            function updatePreview() {
                const text = wmText.value || "WATERMARK";
                const color = wmColor.value;
                const size = wmSize.value;
                const opacity = wmOpacity.value / 100;
                const angle = wmAngle.value;

                document.getElementById("fontSizeVal").innerText = size;
                document.getElementById("opacityVal").innerText = opacity;
                document.getElementById("angleVal").innerText = angle;

                watermarkPreview.innerText = text;
                watermarkPreview.style.color = color;
                watermarkPreview.style.fontSize = `${size * 0.7}px`; // scaled down for preview viewport
                watermarkPreview.style.opacity = opacity;
                watermarkPreview.style.transform = `rotate(-${angle}deg)`;
            }

            // Apply & Download PDF
            document.getElementById("downloadPdfBtn").addEventListener("click", async () => {
                if (!pdfBytesArray) return;
                
                try {
                    showToast("Processing PDF. Please wait...", "info");

                    const { PDFDocument, rgb, degrees, StandardFonts } = PDFLib;
                    
                    // Load the PDF document
                    const pdfDoc = await PDFDocument.load(pdfBytesArray);
                    
                    // Choose font
                    const fontName = wmFont.value;
                    let fontRef;
                    if (fontName === "Times-Roman") {
                        fontRef = await pdfDoc.embedFont(StandardFonts.TimesRomanBold);
                    } else if (fontName === "Courier") {
                        fontRef = await pdfDoc.embedFont(StandardFonts.CourierBold);
                    } else {
                        fontRef = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
                    }

                    const pages = pdfDoc.getPages();
                    const text = wmText.value || "WATERMARK";
                    const size = parseInt(wmSize.value);
                    const opacity = parseFloat(wmOpacity.value) / 100;
                    const angle = parseInt(wmAngle.value);
                    
                    // Convert Hex to rgb numbers
                    const hexColor = wmColor.value;
                    const r = parseInt(hexColor.slice(1, 3), 16) / 255;
                    const g = parseInt(hexColor.slice(3, 5), 16) / 255;
                    const b = parseInt(hexColor.slice(5, 7), 16) / 255;

                    const pageOption = document.querySelector('input[name="wmPageOption"]:checked').value;
                    
                    // Apply to pages
                    const applyPages = pageOption === "first" ? [pages[0]] : pages;

                    applyPages.forEach(page => {
                        const { width, height } = page.getSize();
                        
                        // Calculate middle coordinates
                        const x = width / 2;
                        const y = height / 2;

                        page.drawText(text, {
                            x: x - (text.length * size * 0.25), // Center align adjustment
                            y: y - (size / 2),
                            size: size,
                            font: fontRef,
                            color: rgb(r, g, b),
                            rotate: degrees(angle),
                            opacity: opacity,
                        });
                    });

                    // Save the watermarked PDF bytes
                    const outputPdfBytes = await pdfDoc.save();

                    // Trigger client-side download
                    const blob = new Blob([outputPdfBytes], { type: "application/pdf" });
                    const link = document.createElement("a");
                    link.download = `watermarked-${currentFileName}`;
                    link.href = URL.createObjectURL(blob);
                    link.click();

                    showToast("PDF Watermark applied successfully!");
                } catch (err) {
                    console.error(err);
                    showToast("Failed to process PDF watermark.", "error");
                }
            });
        });
    </script>
</body>
</html>
